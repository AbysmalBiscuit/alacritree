name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  alacritree:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # eframe (winit + glow), arboard (X11/Wayland clipboard), and the unix
      # fontconfig dep all need C headers that aren't on the runner by default.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config \
            libfreetype6-dev libfontconfig1-dev \
            libxkbcommon-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Rust toolchain
        run: rustup show && rustup component add clippy

      - name: Build
        run: cargo build -p alacritree --locked

      - name: Test
        run: cargo test -p alacritree --locked

      # --no-deps keeps clippy on our own crate. The vendored alacritty_terminal
      # is #![deny(clippy::all)], so a newer toolchain that adds a lint (e.g.
      # question_mark) turns it into a hard error we can't fix without editing a
      # read-only dependency. Linting the fork's code, not upstream's, is what we
      # want anyway.
      - name: Clippy
        run: cargo clippy -p alacritree --all-targets --locked --no-deps

  # Compile the platform-specific process and notification integrations before
  # a release tag reaches cargo-dist.  Branch pushes with an open PR already
  # receive the pull_request run, so only run direct pushes for master.
  alacritree-macos:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: brew install cmake pkg-config fontconfig freetype

      - name: Rust toolchain
        run: rustup show

      - name: Check
        run: cargo check -p alacritree --locked
