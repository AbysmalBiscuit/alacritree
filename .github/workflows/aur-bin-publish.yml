name: Publish alacritree-bin to AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.2.0)"
        required: true

# Avoid two simultaneous publishes if a manual dispatch races a release event.
concurrency:
  group: aur-bin-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stamp PKGBUILD with version and asset hashes
        id: stamp
        env:
          GH_TOKEN: ${{ secrets.ALACRITREE_BOT_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          pkgbuild=packaging/aur/alacritree-bin/PKGBUILD

          asset_names=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                --json assets --jq '.assets[].name')

          # A release published by release-please fires `release: published`
          # before the build has uploaded anything; the fan-out at the end of
          # release.yml re-dispatches this workflow once the assets exist. A
          # release with *some* assets but not ours is genuinely broken and
          # still fails below.
          if [[ -z "$asset_names" ]]; then
            echo "Release $TAG has no assets yet; skipping until the build fans out."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for arch in x86_64 aarch64; do
            asset="alacritree-${TAG}-${arch}-linux.tar.gz"
            if ! grep -qx "$asset" <<< "$asset_names"; then
              echo "Release $TAG is missing $asset; refusing to publish a broken alacritree-bin." >&2
              exit 1
            fi
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${asset}"
            curl --fail --location --output "/tmp/${asset}" "$url"
            declare "hash_${arch}=$(sha256sum "/tmp/${asset}" | cut -d' ' -f1)"
          done

          sed -i \
            -e "s/^pkgver=.*/pkgver=${version}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${hash_x86_64}')/" \
            -e "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${hash_aarch64}')/" \
            "$pkgbuild"

          echo "--- stamped PKGBUILD ---"
          cat "$pkgbuild"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish to AUR
        if: steps.stamp.outputs.publish == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: alacritree-bin
          pkgbuild: packaging/aur/alacritree-bin/PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: ${{ github.actor }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Bump alacritree-bin to ${{ github.event.release.tag_name || inputs.tag }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: false
          allow_empty_commits: false
