name: Release macOS app bundle

# Post-announce hook for the dist pipeline. dist only ships bare-binary
# archives, but on macOS notifications require a bundle identifier
# (UNUserNotificationCenter refuses to run unbundled), so releases also
# carry an ad-hoc-signed Alacritree.app.
on:
  workflow_call:
    inputs:
      plan:
        description: "dist plan (JSON), provided by the dist workflow"
        required: true
        type: string

jobs:
  app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: brew install cmake pkg-config fontconfig freetype

      - name: Build and upload Alacritree.app
        env:
          GH_TOKEN: ${{ secrets.ALACRITREE_BOT_TOKEN }}
          PLAN: ${{ inputs.plan }}
        run: |
          set -euo pipefail
          # Tolerate tags cut before the bundle template landed on master.
          if [[ ! -x alacritree/extra/osx/make-app.sh ]]; then
            echo "No alacritree/extra/osx/make-app.sh at this tag; skipping .app asset."
            exit 0
          fi
          tag=$(jq -r '.announcement_tag' <<< "$PLAN")
          ./alacritree/extra/osx/make-app.sh
          asset="alacritree-${tag}-Alacritree.app.tar.gz"
          tar -C target/release/osx -czf "$asset" Alacritree.app
          gh release upload "$tag" "$asset" --repo "$GITHUB_REPOSITORY" --clobber
